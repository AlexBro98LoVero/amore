<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una domanda per te ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6; /* Un bel rosa pastello */
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden; /* Evita le barre di scorrimento quando il bottone scappa */
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff4d4d;
            margin-bottom: 30px;
            font-size: 2rem;
            transition: all 0.3s;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 60px;
        }

        button {
            font-size: 20px;
            padding: 10px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }

        #btn-yes {
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btn-yes:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: top 0.2s, left 0.2s; /* Rende il movimento fluido */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Mi Vuoi Bene?</h1>
        <div class="buttons">
            <button id="btn-yes">Sì!</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const question = document.getElementById('question');

        // Frasi carine che cambiano ogni volta che si preme "Sì"
        const frasi = [
            "Davvero?",
            "Ma proprio sul serio?",
            "Prometti che non stai scherzando?",
            "Ok, ultima conferma...",
            "Sapevo che avresti detto di sì! Ti amo! ❤️"
        ];
        
        let contatore = 0;

        // Logica per far scappare il bottone "No"
        btnNo.addEventListener('mouseover', () => {
            // Calcola dimensioni casuali entro i limiti della finestra
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 20);

            // Applica il posizionamento fisso per farlo muovere liberamente
            btnNo.style.position = 'fixed';
            btnNo.style.left = `${Math.max(10, x)}px`;
            btnNo.style.top = `${Math.max(10, y)}px`;
        });

        // Logica per quando clicca "Sì"
        btnYes.addEventListener('click', () => {
            if (contatore < frasi.length) {
                // Aggiorna il testo
                question.innerText = frasi[contatore];
                
                // Ingrandisce un po' il pulsante del "Sì" ad ogni click (effetto psicologico divertente)
                let stileAttuale = window.getComputedStyle(btnYes);
                let dimensioneFont = parseFloat(stileAttuale.fontSize);
                btnYes.style.fontSize = `${dimensioneFont + 4}px`;
                btnYes.style.padding = `${dimensioneFont}px ${dimensioneFont + 20}px`;
                
                contatore++;
                
                // Quando arriva all'ultima frase, nascondi i bottoni
                if (contatore === frasi.length) {
                    document.querySelector('.buttons').style.display = 'none';
                    // Puoi aggiungere dei coriandoli o un'immagine qui sotto se vuoi!
                }
            }
        });
    </script>

</body>
</html>
