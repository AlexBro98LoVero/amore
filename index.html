<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una domanda per te ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #ff4d4d;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 60px;
        }

        button {
            font-size: 18px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; 
        }

        #btn-yes {
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        #btn-yes:active {
            transform: scale(0.95);
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            z-index: 999;
            /* Forza il telefono a non usare animazioni di transizione */
            transition: none !important; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Vuoi essere la mia ragazza?</h1>
        <div class="buttons">
            <button id="btn-yes">Sì!</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const question = document.getElementById('question');

        const frasi = [
            "Davvero? 😍",
            "Ma proprio sul serio?",
            "Prometti che non stai scherzando? 🥺",
            "Ok, ultima conferma...",
            "Sapevo che avresti detto di sì! Ti amo! ❤️"
        ];
        
        let contatore = 0;
        let ultimoSpostamento = 0;
        let originalX = null;
        let originalY = null;

        function scappaBottone(evento) {
            if (evento) {
                evento.preventDefault();
                evento.stopPropagation();
            }

            // Soluzione al problema del telefono: blocca i click multipli contemporanei
            const ora = Date.now();
            if (ora - ultimoSpostamento < 200) return;
            ultimoSpostamento = ora;

            // Salva la posizione iniziale del bottone solo la prima volta
            if (originalX === null || originalY === null) {
                const rect = btnNo.getBoundingClientRect();
                originalX = rect.left;
                originalY = rect.top;
            }

            // Calcola i limiti dello schermo
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;

            // Genera una posizione casuale assoluta nello schermo
            const targetX = Math.max(10, Math.random() * maxX);
            const targetY = Math.max(10, Math.random() * maxY);

            // Calcola lo spostamento necessario rispetto alla posizione di partenza
            const translateX = targetX - originalX;
            const translateY = targetY - originalY;

            // Sposta il bottone usando la GPU del telefono (addio lag e blocchi)
            btnNo.style.transform = `translate(${translateX}px, ${translateY}px)`;
        }

        // Assegna gli eventi per PC e Telefono
        btnNo.addEventListener('mouseover', scappaBottone);
        btnNo.addEventListener('touchstart', scappaBottone, { passive: false });
        btnNo.addEventListener('pointerdown', scappaBottone);
        btnNo.addEventListener('click', scappaBottone);

        btnYes.addEventListener('click', () => {
            if (contatore < frasi.length) {
                question.innerText = frasi[contatore];
                
                let stileAttuale = window.getComputedStyle(btnYes);
                let dimensioneFont = parseFloat(stileAttuale.fontSize);
                btnYes.style.fontSize = `${dimensioneFont + 3}px`;
                btnYes.style.padding = `${dimensioneFont + 2}px ${dimensioneFont + 15}px`;
                
                contatore++;
                
                if (contatore === frasi.length) {
                    document.querySelector('.buttons').style.display = 'none';
                }
            }
        });
    </script>

</body>
</html>
