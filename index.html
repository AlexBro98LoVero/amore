<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una domanda per te ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #ff4d4d;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 60px;
        }

        button {
            font-size: 18px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; 
        }

        #btn-yes {
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        #btn-yes:active {
            transform: scale(0.95);
        }

        #btn-no {
            background-color: #f44336;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            /* RIMOSSA LA TRANSIZIONE: Ora si sposta all'istante a livello di pixel, azzerando il lag */
            position: relative; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Mi vuoi bene?</h1>
        <div class="buttons">
            <button id="btn-yes">Sì!</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const question = document.getElementById('question');

        const frasi = [
            "Davvero? 😍",
            "Ma proprio sul serio?",
            "Prometti che non stai scherzando? 🥺",
            "Ok, ultima conferma...",
            "Sapevo che avresti detto di sì! Ti amo! ❤️"
        ];
        
        let contatore = 0;

        function scappaBottone(evento) {
            if (evento) {
                evento.preventDefault();
                evento.stopPropagation(); // Blocca qualsiasi altra azione del browser
            }

            // Calcolo della posizione sullo schermo
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 20);

            btnNo.style.position = 'fixed';
            btnNo.style.left = `${Math.max(10, x)}px`;
            btnNo.style.top = `${Math.max(10, y)}px`;
        }

        // Cattura l'avvicinamento del mouse (PC)
        btnNo.addEventListener('mouseover', scappaBottone);
        
        // Intercetta il tocco istantaneo sul telefono (prima ancora del click)
        btnNo.addEventListener('touchstart', scappaBottone, { passive: false });
        
        // Di sicurezza: se tocca/clicca in qualsiasi modo, esegue SOLO la fuga
        btnNo.addEventListener('pointerdown', scappaBottone);
        btnNo.addEventListener('click', scappaBottone);

        btnYes.addEventListener('click', () => {
            if (contatore < frasi.length) {
                question.innerText = frasi[contatore];
                
                let stileAttuale = window.getComputedStyle(btnYes);
                let dimensioneFont = parseFloat(stileAttuale.fontSize);
                btnYes.style.fontSize = `${dimensioneFont + 3}px`;
                btnYes.style.padding = `${dimensioneFont + 2}px ${dimensioneFont + 15}px`;
                
                contatore++;
                
                if (contatore === frasi.length) {
                    document.querySelector('.buttons').style.display = 'none';
                }
            }
        });
    </script>

</body>
</html>
